spring.datasource.url= jdbc:mysql://localhost:3306/unit-of-measurement?createDatabaseIfNotExist=True
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform = org.hibernate.dialect.MySQL5Dialect
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto = update
spring.application.name= msunitofmeasurement
server.port=0
eureka.client.defaultZone=http://localhost:8761/eureka
instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

